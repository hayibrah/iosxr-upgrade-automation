# checks.yaml — IOS-XR upgrade health checks (NCS 5500  24.2.1 → 25.2.1)
# Edit this file to add/remove checks. No Python changes needed.
#
# health_checks    : numeric count must NOT drop post-upgrade  (hard fail)
# operational_checks: command output must be identical pre/post (hard fail)
#
# To add a diff-based check:
#   - name: my_check
#     command: "show bgp neighbors"
#     enabled: true

# ------------------------------------------------------------------------------
# health_checks — post count >= pre count, or FAIL
# ------------------------------------------------------------------------------
health_checks:

  # 1. Platform cards in IOS XR RUN (count derived in checks_lib, no path needed)
  - key: platform
    command: "show platform"
    parser: true
    enabled: true

  # 2. Interfaces UP
  - key: interfaces
    command: "show interfaces"
    parser: true
    enabled: true
    test_cases:
      - name: "Interfaces UP"
        metric_key: interfaces_up
        extract:
          path: ["*"]
          filter: {field: line_protocol, regex: "(?i)^up$"}
          aggregate: count
        assert: gte_pre

  # 3. BGP Established sessions
  - key: bgp_summary
    command: "show bgp summary"
    parser: true
    enabled: true
    test_cases:
      - name: "BGP Established Sessions"
        metric_key: bgp_established
        extract:
          path: ["instance", "*", "vrf", "*", "neighbor", "*"]
          filter: {field: session_state, regex: "(?i)^established$"}
          aggregate: count
        assert: gte_pre

  # 4. OSPF FULL neighbors — disable if IS-IS only
  - key: ospf_neighbor
    command: "show ospf neighbor"
    parser: true
    enabled: true
    test_cases:
      - name: "OSPF FULL Neighbors"
        metric_key: ospf_full_neighbors
        extract:
          path: ["vrf", "*", "address_family", "*", "instance", "*",
                 "areas", "*", "interfaces", "*", "neighbors", "*"]
          filter: {field: state, regex: "(?i)^full"}
          aggregate: count
        assert: gte_pre

  # 5. IS-IS UP neighbors — disable if OSPF only
  - key: isis_neighbor
    command: "show isis neighbor"
    parser: true
    enabled: true
    test_cases:
      - name: "IS-IS Neighbors UP"
        metric_key: isis_up_neighbors
        extract:
          path: ["isis", "*", "vrf", "*", "interfaces", "*", "neighbors", "*"]
          filter: {field: state, regex: "(?i)^up$"}
          aggregate: count
        assert: gte_pre

  # 6. MPLS LDP neighbors
  - key: mpls_ldp_neighbor
    command: "show mpls ldp neighbor"
    parser: true
    enabled: true
    test_cases:
      - name: "MPLS LDP Neighbors"
        metric_key: mpls_ldp_neighbors
        extract:
          path: ["vrf", "*", "neighbor", "*"]
          aggregate: count
        assert: gte_pre

  # 7. Total IPv4 routes
  - key: route_summary
    command: "show route summary"
    parser: true
    enabled: true
    test_cases:
      - name: "Total IPv4 Routes"
        metric_key: total_routes_ipv4
        extract:
          path: ["vrf", "*", "address_family", "ipv4",
                 "routes_per_protocol", "Total", "total"]
          aggregate: sum
        assert: gte_pre


# ------------------------------------------------------------------------------
# operational_checks — full before/after diff, any change = FAIL
# ------------------------------------------------------------------------------
operational_checks:

  # Always on — only way to confirm new image is active (no count equivalent)
  # NOTE: will always produce a diff — review to confirm 25.2.1 is listed
  - name: install_active_summary
    command: "show install active summary"
    enabled: true

  - name: redundancy_summary       # dual-RP platforms only (ASR9K, NCS5500+RSP)
    command: "show redundancy summary"
    enabled: false

  - name: ipv4_interface_brief
    command: "show ipv4 interface brief"
    enabled: false

  - name: bgp_vrf_all_summary
    command: "show bgp vrf all summary"
    enabled: false

  - name: mpls_forwarding_summary
    command: "show mpls forwarding summary"
    enabled: false

  - name: mpls_ldp_bindings_summary
    command: "show mpls ldp bindings summary"
    enabled: false


# ------------------------------------------------------------------------------
# critical_counts — platform_cards_running is hardcoded in checks_lib
# (requires traversing both lc + rp sub-keys; not expressible as a YAML path)
# All test_case metric_keys above are auto-merged here — no need to list them.
# ------------------------------------------------------------------------------
critical_counts:
  platform_cards_running: "Platform Cards in IOS XR RUN"
