# =============================================================================
# FILE    : inventory.ini
# PURPOSE : Ansible inventory for IOS-XR upgrade targets.
#
# Credentials are set via environment variables — do NOT hardcode passwords.
#   export NET_USERNAME=admin
#   export NET_PASSWORD=yourpassword
#
# To use Ansible Vault instead:
#   ansible-vault encrypt_string 'yourpassword' --name 'ansible_password'
# =============================================================================

# ---------------------------------------------------------------------------
# Group: all IOS-XR routers targeted for upgrade
# ---------------------------------------------------------------------------
[iosxr_routers]
router-1  ansible_host=192.168.1.1
router-2  ansible_host=192.168.1.2
# router-3  ansible_host=192.168.1.3

# ---------------------------------------------------------------------------
# Group variables — applied to every host in [iosxr_routers]
# ---------------------------------------------------------------------------
[iosxr_routers:vars]
ansible_network_os=cisco.iosxr.iosxr
ansible_connection=ansible.netcommon.network_cli
ansible_user={{ lookup('env', 'NET_USERNAME') }}
ansible_password={{ lookup('env', 'NET_PASSWORD') }}
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# ---------------------------------------------------------------------------
# Optional sub-groups for staged rollouts (upgrade core first, then edge)
# ---------------------------------------------------------------------------
[core_routers]
router-1  ansible_host=192.168.1.1

[edge_routers]
router-2  ansible_host=192.168.1.2
