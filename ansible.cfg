# =============================================================================
# FILE    : ansible.cfg
# PURPOSE : Ansible configuration for IOS-XR network automation.
#           Long timeouts are required for image transfer and device reload.
# =============================================================================

[defaults]
# Inventory file location
inventory             = inventory.ini

# Don't create .retry files on failure (keeps the repo clean)
retry_files_enabled   = false

# Suppress deprecation warnings from cisco.iosxr collection
deprecation_warnings  = false

# Show task execution time in output
callbacks_enabled     = timer, profile_tasks

# Number of parallel hosts (adjust based on your change window risk appetite)
# For production upgrades, keep this low (1 = serial, safe)
forks                 = 1

# Reduce stdout noise — use 'debug' for troubleshooting
stdout_callback       = default

# Role / collection search paths
collections_path      = ~/.ansible/collections:/usr/share/ansible/collections

# =============================================================================
# Persistent connection settings
# These MUST be long enough to survive:
#   - SFTP image transfer  (up to 30 min on slow links)
#   - install activate     (triggers reload — device goes offline)
#   - Device boot + XR init (can take 10-15 min on NCS/ASR platforms)
# =============================================================================
[persistent_connection]
# How long (seconds) to wait to establish the initial SSH connection
connect_timeout       = 60

# How long (seconds) a single command can take before timing out
# Set to 2700 (45 min) to cover the worst-case image transfer
command_timeout       = 2700

# How long the persistent connection socket is kept alive when idle
connect_retry_timeout = 15

# =============================================================================
# SSH settings
# =============================================================================
[ssh_connection]
# Avoid SSH host-key verification failures on first connect or after rebuild
# NOTE: Set to 'yes' in security-hardened environments and pre-populate known_hosts
ssh_args              = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10

# Use the faster SSH ControlMaster multiplexing where possible
pipelining            = false   # Must remain false for network devices

# =============================================================================
# Privilege escalation (not typically needed for IOS-XR — leave disabled)
# =============================================================================
[privilege_escalation]
become                = false
